<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body style="text-align:center; margin-top:100px; font-family:sans-serif;">

<h1>🚀 Note Competition</h1>

<input type="text" id="nickname" placeholder="Enter nickname"><br><br>

<button onclick="login()">Login with Google</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = { /* same config */ };

const app = initializeApp(firebaseConfig);
const auth = getAuth();

window.login = async () => {
  const nickname = document.getElementById("nickname").value;

  if (!nickname) {
    alert("Nickname dao!");
    return;
  }

  const provider = new GoogleAuthProvider();
  const result = await signInWithPopup(auth, provider);

  localStorage.setItem("nickname", nickname);
  localStorage.setItem("email", result.user.email);

  window.location.href = "app.html";
};
</script>

</body>
</html>
