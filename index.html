<!DOCTYPE html>
<html>
<head>
  <title>Note Competition</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      margin: 0;
      text-align: center;
    }

    h1 {
      background: #4CAF50;
      color: white;
      padding: 15px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin: 5px;
    }

    textarea {
      width: 80%;
      height: 100px;
      padding: 10px;
      border-radius: 8px;
    }

    #notes {
      width: 80%;
      margin: auto;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: left;
    }

    .vote {
      background: #2196F3;
      color: white;
    }

    .delete {
      background: red;
      color: white;
    }
  </style>
</head>

<body>

<h1>🏆 Note Competition</h1>

<button onclick="login()">🔐 Login</button>

<h2>✍️ Submit Note</h2>
<textarea id="note" placeholder="Write note..."></textarea><br>
<button onclick="submitNote()">Submit</button>

<h2>📚 All Notes</h2>
<div id="notes"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBTDfFNbtXgf6I2OfwS_f6nCXLym2eSzc8",
  authDomain: "note-competition.firebaseapp.com",
  projectId: "note-competition",
  storageBucket: "note-competition.firebasestorage.app",
  messagingSenderId: "742140044633",
  appId: "1:742140044633:web:36cb08ff2aafc23c111848"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

const ADMIN_EMAIL = "mdtanvirrahman2021a@gmail.com";

let user = null;

// 🔐 Login
window.login = async () => {
  const provider = new GoogleAuthProvider();
  const result = await signInWithPopup(auth, provider);
  user = result.user;
  alert("Logged in as " + user.email);
  loadNotes();
};

// ✍️ Submit
window.submitNote = async () => {
  const text = document.getElementById("note").value;

  if (!user) {
    alert("Login first!");
    return;
  }

  await addDoc(collection(db, "notes"), {
    text: text,
    votes: 0,
    user: user.email
  });

  document.getElementById("note").value = "";
  loadNotes();
};

// 📥 Load
async function loadNotes() {
  const querySnapshot = await getDocs(collection(db, "notes"));
  const notesDiv = document.getElementById("notes");
  notesDiv.innerHTML = "";

  querySnapshot.forEach((docSnap) => {
    const data = docSnap.data();
    const div = document.createElement("div");
    div.className = "card";

    let deleteBtn = "";

    if (user && user.email === ADMIN_EMAIL) {
      deleteBtn = `<button class="delete" onclick="deleteNote('${docSnap.id}')">❌ Delete</button>`;
    }

    div.innerHTML = `
      <p><b>${data.user}</b></p>
      <p>${data.text}</p>

      <button class="vote" onclick="vote('${docSnap.id}')">
        👍 Vote (${data.votes || 0})
      </button>

      ${deleteBtn}
    `;

    notesDiv.appendChild(div);
  });
}

// 👍 Vote
window.vote = async (id) => {
  const ref = doc(db, "notes", id);
  await updateDoc(ref, {
    votes: increment(1)
  });
  loadNotes();
};

// ❌ Delete (admin only)
window.deleteNote = async (id) => {
  if (!confirm("Delete this note?")) return;

  const ref = doc(db, "notes", id);
  await deleteDoc(ref);

  loadNotes();
};

loadNotes();
</script>

</body>
</html>

</body>
</html>
