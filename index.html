<!DOCTYPE html>
<html>
<head>
  <title>Note Competition</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    h1 {
      background: #4CAF50;
      color: white;
      padding: 15px;
      margin: 0;
    }

    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 10px 15px;
      margin: 5px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

    textarea {
      width: 80%;
      height: 100px;
      margin: 10px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    #notes {
      width: 80%;
      margin: auto;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: left;
    }

    .username {
      font-weight: bold;
      color: #333;
    }

    .vote-btn {
      background: #2196F3;
    }

    .vote-btn:hover {
      background: #1976D2;
    }
  </style>
</head>

<body>

<h1>🏆 Note Competition</h1>

<button onclick="login()">🔐 Login with Google</button>

<h2>✍️ Submit Note</h2>
<textarea id="note" placeholder="Write your best note..."></textarea>
<br>
<button onclick="submitNote()">🚀 Submit</button>

<h2>📚 All Notes</h2>
<div id="notes"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBTDfFNbtXgf6I2OfwS_f6nCXLym2eSzc8",
  authDomain: "note-competition.firebaseapp.com",
  projectId: "note-competition",
  storageBucket: "note-competition.firebasestorage.app",
  messagingSenderId: "742140044633",
  appId: "1:742140044633:web:36cb08ff2aafc23c111848"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let user = null;

window.login = async () => {
  const provider = new GoogleAuthProvider();
  const result = await signInWithPopup(auth, provider);
  user = result.user;
  alert("Logged in as " + user.displayName);
};

window.submitNote = async () => {
  const text = document.getElementById("note").value;

  if (!user) {
    alert("Login first!");
    return;
  }

  await addDoc(collection(db, "notes"), {
    text: text,
    votes: 0,
    user: user.displayName
  });

  document.getElementById("note").value = "";
  loadNotes();
};

async function loadNotes() {
  const querySnapshot = await getDocs(collection(db, "notes"));
  const notesDiv = document.getElementById("notes");
  notesDiv.innerHTML = "";

  querySnapshot.forEach((docSnap) => {
    const data = docSnap.data();
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <p class="username">👤 ${data.user || "Unknown"}</p>
      <p>${data.text}</p>
      <button class="vote-btn" onclick="vote('${docSnap.id}')">
        👍 Vote (${data.votes || 0})
      </button>
    `;

    notesDiv.appendChild(div);
  });
}

window.vote = async (id) => {
  const ref = doc(db, "notes", id);
  await updateDoc(ref, {
    votes: increment(1)
  });
  loadNotes();
};

loadNotes();
</script>

</body>
</html>
