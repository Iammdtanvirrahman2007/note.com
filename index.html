<!DOCTYPE html>
<html>
<head>
  <title>Note Competition</title>
</head>
<body>

<h1>Note Competition</h1>

<button onclick="login()">Login with Google</button>

<h2>Submit Note</h2>
<textarea id="note" placeholder="Write your note"></textarea>
<br>
<button onclick="submitNote()">Submit</button>

<h2>All Notes</h2>
<div id="notes"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// 🔴 এখানে তোমার Firebase config বসাও
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let user = null;

window.login = async () => {
  const provider = new GoogleAuthProvider();
  const result = await signInWithPopup(auth, provider);
  user = result.user;
  alert("Logged in as " + user.displayName);
};

window.submitNote = async () => {
  const text = document.getElementById("note").value;
  await addDoc(collection(db, "notes"), {
    text: text,
    votes: 0
  });
  loadNotes();
};

async function loadNotes() {
  const querySnapshot = await getDocs(collection(db, "notes"));
  const notesDiv = document.getElementById("notes");
  notesDiv.innerHTML = "";

  querySnapshot.forEach((docSnap) => {
    const data = docSnap.data();
    const div = document.createElement("div");

    div.innerHTML = `
      <p>${data.text}</p>
      <button onclick="vote('${docSnap.id}', ${data.votes})">
        Vote (${data.votes})
      </button>
      <hr>
    `;

    notesDiv.appendChild(div);
  });
}

window.vote = async (id, votes) => {
  const ref = doc(db, "notes", id);
  await updateDoc(ref, { votes: votes + 1 });
  loadNotes();
};

loadNotes();
</script>

</body>
</html>
