<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <style>
    body {
      text-align: center;
      margin-top: 100px;
      font-family: Arial;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .box {
      background: white;
      color: black;
      padding: 30px;
      border-radius: 12px;
      display: inline-block;
    }

    input {
      padding: 10px;
      width: 200px;
      border-radius: 6px;
      border: 1px solid gray;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #667eea;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #5a67d8;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>🚀 Note Competition</h1>

  <input type="text" id="nickname" placeholder="Enter nickname"><br><br>

  <button onclick="login()">Login with Google</button>
</div>

<script type="module">

// 🔥 Firebase import
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

// ✅ তোমার Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyBTDfFNbtXgf6I2OfwS_f6nCXLym2eSzc8",
  authDomain: "note-competition.firebaseapp.com",
  projectId: "note-competition",
  storageBucket: "note-competition.firebasestorage.app",
  messagingSenderId: "742140044633",
  appId: "1:742140044633:web:36cb08ff2aafc23c111848"
};

// 🔥 initialize
const app = initializeApp(firebaseConfig);
const auth = getAuth();

// 🔁 already login থাকলে skip
if (localStorage.getItem("nickname")) {
  window.location.href = "app.html";
}

// 🔐 login function
window.login = async () => {
  const nickname = document.getElementById("nickname").value.trim();

  if (!nickname) {
    alert("Nickname dao!");
    return;
  }

  try {
    const provider = new GoogleAuthProvider();
    const result = await signInWithPopup(auth, provider);

    // ✅ save info
    localStorage.setItem("nickname", nickname);
    localStorage.setItem("email", result.user.email);

    // 🚀 go to app
    window.location.href = "app.html";

  } catch (err) {
    alert("Login failed!");
    console.error(err);
  }
};

</script>

</body>
</html>
