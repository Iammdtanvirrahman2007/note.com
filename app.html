<!DOCTYPE html>
<html>
<head>
  <title>Note Competition</title>

  <style>
    :root {
      --bg: #f4f6f9;
      --text: #333;
      --card: #fff;
      --primary: #667eea;
    }

    body.dark {
      --bg: #121212;
      --text: #eee;
      --card: #1e1e1e;
    }

    body {
      margin: 0;
      font-family: Arial;
      background: var(--bg);
      color: var(--text);
      transition: 0.3s;
    }

    .nav {
      background: var(--primary);
      color: white;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav button {
      border: none;
      padding: 6px 12px;
      border-radius: 5px;
      cursor: pointer;
    }

    .toggle { background: black; color: white; }
    .logout { background: crimson; color: white; }

    .container {
      padding: 15px;
      max-width: 600px;
      margin: auto;
      text-align: center;
    }

    textarea {
      width: 100%;
      height: 80px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    .submit-btn {
      margin-top: 10px;
      padding: 8px 20px;
      border: none;
      background: var(--primary);
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    .notes {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    @media (min-width: 600px) {
      .notes { grid-template-columns: 1fr 1fr; }
    }

    @media (min-width: 900px) {
      .notes { grid-template-columns: 1fr 1fr 1fr; }
    }

    .card {
      background: var(--card);
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      text-align: left;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
      margin-top: 8px;
    }

    .vote-btn {
      background: #28a745;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
    }

    .delete-btn {
      background: crimson;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
    }

    footer {
      text-align: center;
      margin: 20px;
    }
  </style>
</head>

<body>

<div class="nav">
  <span id="userName"></span>

  <div>
    <button class="toggle" onclick="toggleMode()">🌙</button>
    <button class="logout" onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">
  <h2>📝 Submit Note</h2>

  <textarea id="note" placeholder="Write something..."></textarea><br>

  <!-- 🔥 NEW IMAGE INPUT -->
  <input type="file" id="image"><br>

  <button class="submit-btn" onclick="submitNote()">Submit</button>

  <h2>📚 All Notes</h2>
  <div id="notes" class="notes"></div>
</div>

<footer>
  <p>💻 Developed by <b>Tanvir Rahman</b></p>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import { 
  getFirestore, collection, addDoc, getDocs, 
  updateDoc, deleteDoc, doc 
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

import {
  getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyBTDfFNbtXgf6I2OfwS_f6nCXLym2eSzc8",
  authDomain: "note-competition.firebaseapp.com",
  projectId: "note-competition",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore();
const storage = getStorage(app);

const nickname = localStorage.getItem("nickname");
const email = localStorage.getItem("email");

if (!nickname) {
  window.location.href = "index.html";
}

document.getElementById("userName").innerText = "👤 " + nickname;

const ADMIN_EMAIL = "mdtanvirrahman2021a@gmail.com";

// dark mode
window.toggleMode = () => {
  document.body.classList.toggle("dark");
  localStorage.setItem("mode", document.body.classList.contains("dark"));
};

if (localStorage.getItem("mode") === "true") {
  document.body.classList.add("dark");
}

// logout
window.logout = () => {
  localStorage.clear();
  window.location.href = "index.html";
};

// submit (🔥 image support)
window.submitNote = async () => {
  const text = document.getElementById("note").value.trim();
  const file = document.getElementById("image").files[0];

  if (!text && !file) return alert("Empty!");

  let imageUrl = "";

  if (file) {
    const storageRef = ref(storage, "images/" + Date.now());
    await uploadBytes(storageRef, file);
    imageUrl = await getDownloadURL(storageRef);
  }

  await addDoc(collection(db, "notes"), {
    text,
    user: nickname,
    votes: 0,
    image: imageUrl
  });

  document.getElementById("note").value = "";
  document.getElementById("image").value = "";
  loadNotes();
};

// load notes
async function loadNotes() {
  const snapshot = await getDocs(collection(db, "notes"));
  const div = document.getElementById("notes");
  div.innerHTML = "";

  snapshot.forEach(docSnap => {
    const data = docSnap.data();
    const votes = data.votes || 0;

    let deleteBtn = "";

    if (email === ADMIN_EMAIL) {
      deleteBtn = `<button class="delete-btn" onclick="deleteNote('${docSnap.id}')">❌</button>`;
    }

    div.innerHTML += `
      <div class="card">
        <b>${data.user}</b>
        <p>${data.text || ""}</p>

        ${data.image ? `<img src="${data.image}">` : ""}

        <button class="vote-btn" onclick="vote('${docSnap.id}', ${votes})">
          👍 ${votes}
        </button>

        ${deleteBtn}
      </div>
    `;
  });
}

// vote
window.vote = async (id, votes) => {
  const refDoc = doc(db, "notes", id);
  await updateDoc(refDoc, { votes: votes + 1 });
  loadNotes();
};

// delete
window.deleteNote = async (id) => {
  if (!confirm("Delete?")) return;

  const refDoc = doc(db, "notes", id);
  await deleteDoc(refDoc);
  loadNotes();
};

loadNotes();
</script>

</body>
</html>
