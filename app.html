<!DOCTYPE html>
<html>
<head>
  <title>Note Competition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg: #f4f6f9;
      --text: #333;
      --card: #fff;
      --primary: #667eea;
    }

    body.dark {
      --bg: #121212;
      --text: #eee;
      --card: #1e1e1e;
    }

    body {
      margin: 0;
      font-family: Arial;
      background: var(--bg);
      color: var(--text);
    }

    .nav {
      background: var(--primary);
      color: white;
      padding: 12px;
      display: flex;
      justify-content: space-between;
    }

    .container {
      padding: 15px;
      max-width: 700px;
      margin: auto;
    }

    textarea {
      width: 100%;
      height: 80px;
      padding: 10px;
    }

    .notes {
      display: grid;
      gap: 10px;
    }

    .card {
      background: var(--card);
      padding: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="nav">
  <span id="userName"></span>
  <div>
    <button onclick="toggleMode()">🌙</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">
  <h2>Submit Note</h2>
  <textarea id="note"></textarea>
  <button onclick="submitNote()">Submit</button>

  <h2>All Notes</h2>
  <div id="notes" class="notes"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBTDfFNbtXgf6I2OfwS_f6nCXLym2eSzc8",
  authDomain: "note-competition.firebaseapp.com",
  projectId: "note-competition",
  storageBucket: "note-competition.firebasestorage.app",
  messagingSenderId: "742140044633",
  appId: "1:742140044633:web:36cb08ff2aafc23c111848"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore();
const auth = getAuth();

const ADMIN_EMAIL = "mdtanvirrahman2021a@gmail.com";

// auth check
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("userName").innerText = user.email;
  } else {
    window.location.href = "index.html";
  }
});

// dark mode
window.toggleMode = () => {
  document.body.classList.toggle("dark");
};

// logout
window.logout = () => {
  auth.signOut();
  window.location.href = "index.html";
};

// submit
window.submitNote = async () => {
  const text = document.getElementById("note").value;

  if (!text) return alert("Empty!");

  await addDoc(collection(db, "notes"), {
    text,
    user: auth.currentUser.email,
    votes: 0
  });

  loadNotes();
};

// load
async function loadNotes() {
  const snap = await getDocs(collection(db, "notes"));
  const div = document.getElementById("notes");
  div.innerHTML = "";

  snap.forEach(d => {
    const data = d.data();

    let del = "";
    if (data.user === ADMIN_EMAIL) {
      del = <button onclick="deleteNote('${d.id}')">❌</button>;
    }

    div.innerHTML += `
      <div class="card">
        <b>${data.user}</b>
        <p>${data.text}</p>
        <button onclick="vote('${d.id}', ${data.votes})">👍 ${data.votes}</button>
        ${del}
      </div>
    `;
  });
}

// vote
window.vote = async (id, v) => {
  await updateDoc(doc(db, "notes", id), { votes: v + 1 });
  loadNotes();
};

// delete
window.deleteNote = async (id) => {
  await deleteDoc(doc(db, "notes", id));
  loadNotes();
};

loadNotes();
</script>

</body>
</html>
