<!DOCTYPE html>
<html>
<head>
  <title>Note Competition</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #333;
      text-align: center;
    }

    .nav {
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 15px;
      font-size: 18px;
    }

    .nav button {
      float: right;
      background: crimson;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 5px;
      cursor: pointer;
    }

    .container {
      margin-top: 30px;
    }

    textarea {
      width: 280px;
      height: 80px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    .submit-btn {
      margin-top: 10px;
      padding: 8px 20px;
      border: none;
      background: #667eea;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    .card {
      background: white;
      margin: 15px auto;
      padding: 15px;
      border-radius: 12px;
      width: 300px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      text-align: left;
    }

    .card b {
      color: #667eea;
    }

    .vote-btn {
      background: #28a745;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
    }

    .delete-btn {
      background: crimson;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
    }

    footer {
      margin-top: 30px;
      color: white;
    }
  </style>
</head>

<body>

<div class="nav">
  <span id="userName"></span>
  <button onclick="logout()">Logout</button>
</div>

<div class="container">
  <h2>📝 Submit Note</h2>

  <textarea id="note" placeholder="Write something..."></textarea><br>
  <button class="submit-btn" onclick="submitNote()">Submit</button>

  <h2>📚 All Notes</h2>
  <div id="notes"></div>
</div>

<footer>
  <p>💻 Developed by <b>Tanvir Rahman</b></p>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { 
  getFirestore, collection, addDoc, getDocs, 
  updateDoc, deleteDoc, doc 
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBTDfFNbtXgf6nCXLym2eSzc8",
  authDomain: "note-competition.firebaseapp.com",
  projectId: "note-competition",
  storageBucket: "note-competition.firebasestorage.app",
  messagingSenderId: "742140044633",
  appId: "1:742140044633:web:36cb08ff2aafc23c111848"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore();

const nickname = localStorage.getItem("nickname");
const email = localStorage.getItem("email");

if (!nickname) {
  window.location.href = "index.html";
}

document.getElementById("userName").innerText = "👤 " + nickname;

const ADMIN_EMAIL = "mdtanvirrahman2021a@gmail.com";

window.logout = () => {
  localStorage.clear();
  window.location.href = "index.html";
};

window.submitNote = async () => {
  const text = document.getElementById("note").value.trim();

  if (!text) {
    alert("Note empty!");
    return;
  }

  await addDoc(collection(db, "notes"), {
    text: text,
    user: nickname,
    votes: 0
  });

  document.getElementById("note").value = "";
  loadNotes();
};

async function loadNotes() {
  const snapshot = await getDocs(collection(db, "notes"));
  const div = document.getElementById("notes");
  div.innerHTML = "";

  snapshot.forEach(docSnap => {
    const data = docSnap.data();
    const votes = data.votes || 0;

    let deleteBtn = "";

    if (email === ADMIN_EMAIL) {
      deleteBtn = `<button class="delete-btn" onclick="deleteNote('${docSnap.id}')">❌ Delete</button>`;
    }

    div.innerHTML += `
      <div class="card">
        <b>${data.user}</b>
        <p>${data.text}</p>

        <button class="vote-btn" onclick="vote('${docSnap.id}', ${votes})">
          👍 Vote (${votes})
        </button>

        ${deleteBtn}
      </div>
    `;
  });
}

window.vote = async (id, votes) => {
  const ref = doc(db, "notes", id);
  await updateDoc(ref, { votes: votes + 1 });
  loadNotes();
};

window.deleteNote = async (id) => {
  if (!confirm("Delete this note?")) return;

  const ref = doc(db, "notes", id);
  await deleteDoc(ref);
  loadNotes();
};

loadNotes();
</script>

</body>
</html>
