<!DOCTYPE html>
<html>
<head>
  <title>App</title>

  <style>
    body {
      font-family: Arial;
      background:#f4f6f9;
      text-align:center;
    }

    .nav {
      background:#333;
      color:white;
      padding:10px;
    }

    .card {
      background:white;
      margin:10px auto;
      padding:15px;
      border-radius:10px;
      width:300px;
      box-shadow:0 2px 5px rgba(0,0,0,0.2);
    }

    textarea {
      width:250px;
      height:80px;
      padding:10px;
    }

    button {
      margin:5px;
      padding:6px 12px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<!-- 🔷 NAVBAR -->
<div class="nav">
  <span id="userName"></span>
  <button onclick="logout()" style="float:right;">Logout</button>
</div>

<h2>Submit Note</h2>
<textarea id="note" placeholder="Write something..."></textarea><br>
<button onclick="submitNote()">Submit</button>

<h2>All Notes</h2>
<div id="notes"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { 
  getFirestore, collection, addDoc, getDocs, 
  updateDoc, deleteDoc, doc 
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// ✅ Firebase config (FULL)
const firebaseConfig = {
  apiKey: "AIzaSyBTDfFNbtXgf6I2OfwS_f6nCXLym2eSzc8",
  authDomain: "note-competition.firebaseapp.com",
  projectId: "note-competition",
  storageBucket: "note-competition.firebasestorage.app",
  messagingSenderId: "742140044633",
  appId: "1:742140044633:web:36cb08ff2aafc23c111848"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore();

// 🔐 check login
const nickname = localStorage.getItem("nickname");
const email = localStorage.getItem("email");

if (!nickname) {
  window.location.href = "index.html";
}

// 👤 show name
document.getElementById("userName").innerText = "👤 " + nickname;

// 👑 admin email
const ADMIN_EMAIL = "mdtanvirrahman2021a@gmail.com";

// 🔓 logout
window.logout = () => {
  localStorage.clear();
  window.location.href = "index.html";
};

// 📝 submit note
window.submitNote = async () => {
  const text = document.getElementById("note").value.trim();

  if (!text) {
    alert("Note empty!");
    return;
  }

  await addDoc(collection(db, "notes"), {
    text: text,
    user: nickname,
    votes: 0
  });

  document.getElementById("note").value = "";
  loadNotes();
};

// 📥 load notes
async function loadNotes() {
  const snapshot = await getDocs(collection(db, "notes"));
  const div = document.getElementById("notes");
  div.innerHTML = "";

  snapshot.forEach(docSnap => {
    const data = docSnap.data();
    const votes = data.votes || 0;

    let deleteBtn = "";

    // 👑 admin only
    if (email === ADMIN_EMAIL) {
      deleteBtn = `<button onclick="deleteNote('${docSnap.id}')">❌ Delete</button>`;
    }

    div.innerHTML += `
      <div class="card">
        <b>${data.user}</b>
        <p>${data.text}</p>

        <button onclick="vote('${docSnap.id}', ${votes})">
          👍 Vote (${votes})
        </button>

        ${deleteBtn}
      </div>
    `;
  });
}

// 👍 vote
window.vote = async (id, votes) => {
  const ref = doc(db, "notes", id);
  await updateDoc(ref, { votes: votes + 1 });
  loadNotes();
};

// ❌ delete
window.deleteNote = async (id) => {
  if (!confirm("Delete this note?")) return;

  const ref = doc(db, "notes", id);
  await deleteDoc(ref);
  loadNotes();
};

// 🚀 load first
loadNotes();
</script>

</body>
</html>
